<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>OPSEC · Proxy / VPN Manager</title>
<style>
  :root{--bg:#0a0e17;--surface:#111827;--border:#1f2d40;--accent:#00d4ff;--accent2:#7c3aed;--text:#e2e8f0;--muted:#64748b;--green:#10b981;--red:#ef4444;--yellow:#f59e0b}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;min-height:100vh;padding:20px}
  h1{color:var(--accent);font-size:1.6rem;letter-spacing:3px;text-transform:uppercase;margin-bottom:4px}
  .subtitle{color:var(--muted);font-size:.8rem;letter-spacing:2px;margin-bottom:30px}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:20px}
  .card{background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:20px}
  .card h2{font-size:.9rem;letter-spacing:2px;color:var(--accent);text-transform:uppercase;margin-bottom:16px;border-bottom:1px solid var(--border);padding-bottom:8px}
  label{display:block;font-size:.75rem;color:var(--muted);margin-bottom:4px;margin-top:10px}
  input,select{width:100%;background:#0d1520;border:1px solid var(--border);border-radius:4px;color:var(--text);padding:8px 10px;font-family:inherit;font-size:.85rem;outline:none}
  input:focus,select:focus{border-color:var(--accent)}
  .row{display:flex;gap:8px}
  .row input{flex:1}
  button{cursor:pointer;border:none;border-radius:4px;padding:8px 14px;font-family:inherit;font-size:.8rem;letter-spacing:1px;text-transform:uppercase;transition:opacity .2s}
  .btn-primary{background:var(--accent);color:#000;font-weight:700}
  .btn-secondary{background:var(--accent2);color:#fff}
  .btn-danger{background:var(--red);color:#fff}
  .btn-sm{padding:4px 10px;font-size:.7rem}
  button:hover{opacity:.85}
  .proxy-list{margin-top:12px;max-height:250px;overflow-y:auto}
  .proxy-item{display:flex;align-items:center;gap:8px;padding:7px 10px;border:1px solid var(--border);border-radius:4px;margin-bottom:6px;font-size:.8rem}
  .proxy-item .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .dot-unknown{background:var(--yellow)}
  .dot-alive{background:var(--green)}
  .dot-dead{background:var(--red)}
  .proxy-info{flex:1}
  .badge{background:var(--border);border-radius:3px;padding:2px 6px;font-size:.7rem;color:var(--muted)}
  .output{background:#060b12;border:1px solid var(--border);border-radius:4px;padding:12px;font-size:.78rem;color:#a3e635;white-space:pre-wrap;max-height:300px;overflow-y:auto;margin-top:12px}
  .tabs{display:flex;gap:4px;margin-bottom:16px}
  .tab{padding:6px 14px;border-radius:4px;font-size:.75rem;letter-spacing:1px;cursor:pointer;background:var(--border);color:var(--muted);border:none;font-family:inherit;text-transform:uppercase}
  .tab.active{background:var(--accent);color:#000;font-weight:700}
  .panel{display:none}.panel.active{display:block}
  .stat{text-align:center;padding:14px;background:#060b12;border-radius:6px;border:1px solid var(--border)}
  .stat .val{font-size:1.8rem;color:var(--accent);font-weight:700}
  .stat .lbl{font-size:.7rem;color:var(--muted);margin-top:4px;letter-spacing:1px;text-transform:uppercase}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:16px}
  .copy-btn{float:right;margin-left:8px}
  textarea{width:100%;background:#060b12;border:1px solid var(--border);border-radius:4px;color:#a3e635;padding:10px;font-family:inherit;font-size:.78rem;resize:vertical;outline:none;margin-top:8px}
</style>
</head>
<body>
<h1>⚡ OPSEC · Proxy / VPN</h1>
<p class="subtitle">Proxy Chain Manager · WireGuard Generator · Tor Config</p>

<div class="grid">
  <!-- ── Proxy Manager ── -->
  <div class="card" style="grid-column:1/-1">
    <h2>Proxy Manager</h2>
    <div class="stats-row">
      <div class="stat"><div class="val" id="statTotal">0</div><div class="lbl">Total</div></div>
      <div class="stat"><div class="val" id="statAlive" style="color:var(--green)">0</div><div class="lbl">Alive</div></div>
      <div class="stat"><div class="val" id="statDead" style="color:var(--red)">0</div><div class="lbl">Dead</div></div>
    </div>
    <div class="row">
      <div style="flex:2"><label>Host / IP</label><input id="pHost" placeholder="127.0.0.1"/></div>
      <div style="flex:1"><label>Port</label><input id="pPort" type="number" placeholder="9050"/></div>
      <div style="flex:1"><label>Type</label>
        <select id="pType"><option>socks5</option><option>socks4</option><option>http</option></select>
      </div>
    </div>
    <div class="row">
      <div style="flex:1"><label>Username (optional)</label><input id="pUser" placeholder="user"/></div>
      <div style="flex:1"><label>Password (optional)</label><input id="pPass" type="password" placeholder="pass"/></div>
      <div style="flex:1"><label>Label</label><input id="pLabel" placeholder="e.g. Tor local"/></div>
    </div>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-primary" onclick="addProxy()">+ Add Proxy</button>
      <button class="btn-secondary" onclick="testAll()">▶ Test All</button>
      <button class="btn-secondary" onclick="exportProxychains()">Export proxychains</button>
      <button class="btn-secondary" onclick="exportJSON()">Export JSON</button>
      <button class="btn-danger btn-sm" onclick="clearProxies()">Clear All</button>
    </div>
    <div class="proxy-list" id="proxyList"></div>
    <div class="output" id="proxyOutput" style="display:none"></div>
  </div>

  <!-- ── WireGuard Generator ── -->
  <div class="card">
    <h2>WireGuard Config Generator</h2>
    <label>Server Public IP / Hostname</label>
    <input id="wgEndpoint" placeholder="203.0.113.1" value="YOUR_SERVER_IP"/>
    <div class="row">
      <div style="flex:1"><label>Listen Port</label><input id="wgPort" type="number" value="51820"/></div>
      <div style="flex:1"><label>VPN Subnet</label><input id="wgSubnet" value="10.0.0.0/24"/></div>
    </div>
    <label>DNS</label>
    <input id="wgDns" value="1.1.1.1"/>
    <label>Number of Clients</label>
    <input id="wgClients" type="number" value="1" min="1" max="50"/>
    <div style="margin-top:12px;display:flex;gap:8px;flex-wrap:wrap">
      <button class="btn-primary" onclick="generateWG()">⚙ Generate Configs</button>
      <button class="btn-secondary" onclick="copyWGOutput()">Copy</button>
    </div>
    <div class="tabs" id="wgTabs" style="margin-top:12px;display:none"></div>
    <div id="wgOutput"></div>
  </div>

  <!-- ── Tor Setup ── -->
  <div class="card">
    <h2>Tor Configuration</h2>
    <div class="row">
      <div style="flex:1"><label>SOCKS Port</label><input id="torSocks" type="number" value="9050"/></div>
      <div style="flex:1"><label>Control Port</label><input id="torControl" type="number" value="9051"/></div>
    </div>
    <label>Control Password</label>
    <input id="torPw" type="password" value="changeme123" placeholder="Control port password"/>
    <label>Mode</label>
    <select id="torMode">
      <option value="client">Client only (no relay)</option>
      <option value="bridge">Use bridges (censored network)</option>
      <option value="transparent">Transparent proxy (all traffic)</option>
    </select>
    <div style="margin-top:12px;display:flex;gap:8px">
      <button class="btn-primary" onclick="generateTorrc()">⚙ Generate torrc</button>
      <button class="btn-secondary" onclick="copyTorrc()">Copy</button>
    </div>
    <textarea id="torrcOutput" rows="12" spellcheck="false" placeholder="Generated torrc will appear here…"></textarea>
  </div>
</div>

<script>
// ── Storage ──────────────────────────────────────────────────────────
let proxies = JSON.parse(localStorage.getItem('opsec_proxies') || '[]');

function save(){ localStorage.setItem('opsec_proxies', JSON.stringify(proxies)); }

function updateStats(){
  document.getElementById('statTotal').textContent = proxies.length;
  document.getElementById('statAlive').textContent = proxies.filter(p=>p.alive===true).length;
  document.getElementById('statDead').textContent  = proxies.filter(p=>p.alive===false).length;
}

function renderProxies(){
  const list = document.getElementById('proxyList');
  if(!proxies.length){ list.innerHTML='<p style="color:var(--muted);font-size:.8rem;padding:8px">No proxies added yet.</p>'; updateStats(); return; }
  list.innerHTML = proxies.map((p,i)=>{
    const dotClass = p.alive===true ? 'dot-alive' : p.alive===false ? 'dot-dead' : 'dot-unknown';
    const latency  = p.latency ? `<span class="badge">${p.latency}ms</span>` : '';
    const auth = p.user ? `<span class="badge">${p.user}:***</span>` : '';
    return `<div class="proxy-item">
      <div class="dot ${dotClass}"></div>
      <div class="proxy-info">
        <span style="color:var(--accent2)">[${p.type}]</span>
        <strong>${p.host}:${p.port}</strong>
        ${latency} ${auth}
        <span style="color:var(--muted)"> ${p.label||''}</span>
      </div>
      <button class="btn-danger btn-sm" onclick="removeProxy(${i})">✕</button>
    </div>`;
  }).join('');
  updateStats();
}

// ── Proxy actions ──────────────────────────────────────────────────
function addProxy(){
  const host = document.getElementById('pHost').value.trim();
  const port = parseInt(document.getElementById('pPort').value);
  if(!host || !port){ alert('Host and port are required.'); return; }
  proxies.push({
    host, port,
    type: document.getElementById('pType').value,
    user: document.getElementById('pUser').value.trim(),
    password: document.getElementById('pPass').value,
    label: document.getElementById('pLabel').value.trim(),
    alive: null, latency: null,
  });
  save(); renderProxies();
  ['pHost','pPort','pUser','pPass','pLabel'].forEach(id=>document.getElementById(id).value='');
}

function removeProxy(i){ proxies.splice(i,1); save(); renderProxies(); }
function clearProxies(){ if(confirm('Remove all proxies?')){ proxies=[]; save(); renderProxies(); } }

async function testAll(){
  const out = document.getElementById('proxyOutput');
  out.style.display='block';
  out.textContent='Testing proxies…\n';
  for(let i=0; i<proxies.length; i++){
    const p = proxies[i];
    out.textContent += `  [${i+1}/${proxies.length}] Testing ${p.host}:${p.port}…`;
    const t0 = performance.now();
    try {
      // Browser cannot test SOCKS — we do a DNS lookup via fetch with CORS
      const url = `http://${p.host}:${p.port}`;
      const ctrl = new AbortController();
      setTimeout(()=>ctrl.abort(), 5000);
      await fetch(url, {signal: ctrl.signal, mode:'no-cors'});
      const ms = Math.round(performance.now()-t0);
      proxies[i].alive = true; proxies[i].latency = ms;
      out.textContent += ` REACHABLE (${ms}ms)\n`;
    } catch(e) {
      const ms = Math.round(performance.now()-t0);
      // If aborted = timeout = dead; if other error, may still be alive but CORS blocked
      if(e.name==='AbortError'){ proxies[i].alive=false; proxies[i].latency=null; out.textContent+=' TIMEOUT\n'; }
      else { proxies[i].alive=null; proxies[i].latency=Math.round(ms); out.textContent+=` UNKNOWN (CORS) — use CLI tool for accurate test\n`; }
    }
  }
  out.textContent += '\nDone. Use proxy_chain.py CLI for accurate SOCKS testing.';
  save(); renderProxies();
}

function exportProxychains(){
  if(!proxies.length){ alert('No proxies to export.'); return; }
  let cfg = '# Generated by OPSEC Proxy Manager\ndynamic_chain\nproxy_dns\n[ProxyList]\n';
  proxies.forEach(p=>{ cfg += `${p.type} ${p.host} ${p.port}${p.user ? ' '+p.user+' '+p.password : ''}\n`; });
  const out = document.getElementById('proxyOutput');
  out.style.display='block'; out.textContent=cfg;
  downloadText('proxychains.conf', cfg);
}

function exportJSON(){
  const json = JSON.stringify(proxies, null, 2);
  const out = document.getElementById('proxyOutput');
  out.style.display='block'; out.textContent=json;
  downloadText('proxies.json', json);
}

function downloadText(filename, text){
  const a=document.createElement('a');
  a.href='data:text/plain;charset=utf-8,'+encodeURIComponent(text);
  a.download=filename; a.click();
}

// ── WireGuard Generator ───────────────────────────────────────────
function genB64Key(){
  const bytes = new Uint8Array(32);
  crypto.getRandomValues(bytes);
  return btoa(String.fromCharCode(...bytes));
}

function buildServerConf(serverPriv, serverVpnIp, port, dns, clients){
  let conf = `[Interface]\nPrivateKey = ${serverPriv}\nAddress = ${serverVpnIp}/24\nListenPort = ${port}\nDNS = ${dns}\nPostUp = iptables -A FORWARD -i wg0 -j ACCEPT; iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE\nPostDown = iptables -D FORWARD -i wg0 -j ACCEPT; iptables -t nat -D POSTROUTING -o eth0 -j MASQUERADE\n`;
  clients.forEach(c=>{
    conf += `\n# Peer: ${c.name}\n[Peer]\nPublicKey = ${c.pub}\nAllowedIPs = ${c.vpnIp}/32\n`;
  });
  return conf;
}

function buildClientConf(cPriv, cVpnIp, serverPub, endpoint, port, dns){
  return `[Interface]\nPrivateKey = ${cPriv}\nAddress = ${cVpnIp}/24\nDNS = ${dns}\n\n[Peer]\nPublicKey = ${serverPub}\nEndpoint = ${endpoint}:${port}\nAllowedIPs = 0.0.0.0/0, ::/0\nPersistentKeepalive = 25\n`;
}

let wgConfigs = {};

function generateWG(){
  const endpoint = document.getElementById('wgEndpoint').value.trim() || 'YOUR_SERVER_IP';
  const port     = parseInt(document.getElementById('wgPort').value) || 51820;
  const dns      = document.getElementById('wgDns').value.trim() || '1.1.1.1';
  const nClients = Math.min(50, Math.max(1, parseInt(document.getElementById('wgClients').value)||1));

  const serverPriv = genB64Key();
  const serverPub  = genB64Key(); // NOTE: in real use, pub = DH(priv). Web Crypto doesn't expose X25519 raw key ops directly.
  const serverVpnIp = '10.0.0.1';

  const clients = [];
  for(let i=0;i<nClients;i++){
    const priv = genB64Key();
    const pub  = genB64Key();
    clients.push({ name:`client${i+1}`, priv, pub, vpnIp:`10.0.0.${i+2}` });
  }

  wgConfigs = {};
  wgConfigs['server'] = buildServerConf(serverPriv, serverVpnIp, port, dns, clients);
  clients.forEach(c=>{
    wgConfigs[c.name] = buildClientConf(c.priv, c.vpnIp, serverPub, endpoint, port, dns);
  });

  // Build tabs
  const tabsEl  = document.getElementById('wgTabs');
  const outputEl= document.getElementById('wgOutput');
  tabsEl.style.display='flex';
  const keys = Object.keys(wgConfigs);
  tabsEl.innerHTML = keys.map((k,i)=>`<button class="tab${i===0?' active':''}" onclick="showWGTab('${k}',this)">${k}</button>`).join('');
  showWGTabContent('server');
}

function showWGTab(name, btn){
  document.querySelectorAll('#wgTabs .tab').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  showWGTabContent(name);
}

function showWGTabContent(name){
  const outputEl = document.getElementById('wgOutput');
  outputEl.innerHTML = `<textarea id="wgTA" rows="14" spellcheck="false">${wgConfigs[name]}</textarea>
    <button class="btn-secondary btn-sm" style="margin-top:6px" onclick="downloadText('${name==='server'?'wg0-server':'wg0-'+name}.conf', document.getElementById('wgTA').value)">⬇ Download</button>`;
}

function copyWGOutput(){
  const ta = document.getElementById('wgTA');
  if(ta){ navigator.clipboard.writeText(ta.value).then(()=>alert('Copied!')); }
}

// ── Tor Config Generator ──────────────────────────────────────────
function generateTorrc(){
  const socks   = document.getElementById('torSocks').value || '9050';
  const control = document.getElementById('torControl').value || '9051';
  const pw      = document.getElementById('torPw').value || 'changeme123';
  const mode    = document.getElementById('torMode').value;

  let torrc = `# Generated by OPSEC Tor Setup Helper
SocksPort ${socks}
ControlPort ${control}
HashedControlPassword <run: tor --hash-password "${pw}">

Log notice file /var/log/tor/notices.log
DataDirectory /var/lib/tor

MaxCircuitDirtiness 600
NewCircuitPeriod 30
CircuitBuildTimeout 60
ExitPolicy reject *:*
`;

  if(mode === 'bridge'){
    torrc += `
# Bridge configuration
UseBridges 1
ClientTransportPlugin obfs4 exec /usr/bin/obfs4proxy
# Add your bridge lines below:
# Bridge obfs4 <IP>:<PORT> <FP> cert=<CERT> iat-mode=0
`;
  }

  if(mode === 'transparent'){
    torrc += `
# Transparent proxy
TransPort 9040
DNSPort 5353
AutomapHostsOnResolve 1
AutomapHostsSuffixes .exit,.onion
`;
  }

  document.getElementById('torrcOutput').value = torrc;
}

function copyTorrc(){
  const val = document.getElementById('torrcOutput').value;
  if(val){ navigator.clipboard.writeText(val).then(()=>alert('Copied to clipboard!')); }
}

// ── Init ──────────────────────────────────────────────────────────
renderProxies();
generateTorrc();
generateWG();
</script>
</body>
</html>
